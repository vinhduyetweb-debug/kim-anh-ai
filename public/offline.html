<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8c7d8" />
    <title>Kim Anh AI - Offline</title>
    <style>
      :root {
        color: #4f3d34;
        background: #fff7e8;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          radial-gradient(circle at top left, rgba(248, 199, 216, 0.74), transparent 36%),
          radial-gradient(circle at right 28%, rgba(127, 201, 165, 0.46), transparent 32%),
          #fff7e8;
      }

      main {
        width: min(100%, 440px);
        padding: 26px 22px;
        border: 4px solid rgba(255, 255, 255, 0.78);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.68);
        box-shadow: 0 18px 36px rgba(93, 68, 50, 0.12);
        text-align: center;
      }

      .icon {
        font-size: 4rem;
      }

      h1 {
        margin: 10px 0;
        font-size: 1.8rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #6b554a;
        font-weight: 800;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">🐱🌈</div>
      <h1>Kim Anh vẫn ở đây nè ✨</h1>
      <p>Một số nội dung có thể cần mạng để tải lần đầu.</p>
    </main>
  </body>
</html>
