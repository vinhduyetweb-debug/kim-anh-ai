<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFF4CC">
  <title>Bé Tô Màu - V5 Premium Coloring</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=5">
  <link rel="stylesheet" href="../kimanh-bridge.css">
</head>
<body>
<main class="app">
  <header class="header toy-card">
    <div class="brand-copy">
      <span class="eyebrow">Sân chơi màu sắc cho họa sĩ nhí</span>
      <h1><span class="logo-bubble">🎨</span> Bé Tô Màu</h1>
      <p id="slogan">Tô một chút, vui cả ngày ✨</p>
    </div>
    <button id="completeBtn" class="mascot" type="button" aria-label="Hoàn thành tranh">
      <span class="mascot-face">🐱</span>
      <span class="mascot-label">Xong!</span>
    </button>
  </header>

  <section class="challenge toy-card">
    <div>
      <strong>🔥 Thử thách hôm nay</strong>
      <span>Chọn tranh đẹp, tô màu rực rỡ, nhận sticker cầu vồng.</span>
    </div>
    <span class="reward-pill">⭐ +1 sticker</span>
  </section>

  <section class="categoryBar" aria-label="Chủ đề tranh">
    <button class="catChip active" data-category="animals">🐾 Animals</button>
    <button class="catChip" data-category="ocean">🌊 Ocean</button>
    <button class="catChip" data-category="robotcat">🤖 Robot Cat</button>
    <button class="catChip" data-category="all">🌈 Tất cả</button>
  </section>

  <section id="sampleStrip" class="sampleStrip" aria-label="Chọn mẫu tranh"></section>

  <section id="canvasBox" class="canvasBox">
    <canvas id="paintCanvas"></canvas>
    <canvas id="lineCanvas"></canvas>
    <div id="sparkleLayer" class="sparkleLayer"></div>
    <div id="toast" class="toast">Chọn tranh, chọn màu rồi kéo để tô</div>
  </section>

  <section class="toolbar toy-card">
    <div class="topTools">
      <label class="btn primary">📷 <span>Upload</span>
        <input id="imageInput" type="file" accept="image/*" hidden>
      </label>
      <button id="lineBtn" class="btn">✏️ <span>Nét chì</span></button>
      <button id="saveBtn" class="btn good">💾 <span>Lưu</span></button>
      <button id="completeBtn2" class="btn wow">🎉 <span>Hoàn thành</span></button>
    </div>

    <div class="toolDock" aria-label="Công cụ tô màu">
      <button id="brushBtn" class="toolBtn active" data-tool="brush"><span>🖌️</span><small>Cọ</small></button>
      <button id="markerBtn" class="toolBtn" data-tool="marker"><span>✍️</span><small>Bút lông</small></button>
      <button id="crayonBtn" class="toolBtn" data-tool="crayon"><span>🖍️</span><small>Sáp</small></button>
      <button id="glitterBtn" class="toolBtn" data-tool="glitter"><span>✨</span><small>Kim tuyến</small></button>
      <button id="eraserBtn" class="toolBtn" data-tool="eraser"><span>🧽</span><small>Gôm</small></button>
      <button id="stickerBtn" class="toolBtn" data-tool="sticker"><span>🌟</span><small>Sticker</small></button>
      <button id="undoBtn" class="toolBtn"><span>↶</span><small>Undo</small></button>
      <button id="redoBtn" class="toolBtn"><span>↷</span><small>Redo</small></button>
      <button id="resetBtn" class="toolBtn danger"><span>↺</span><small>Xóa</small></button>
    </div>

    <div id="stickerTray" class="stickerTray" aria-label="Chọn sticker">
      <button class="stickerChoice active" type="button" data-sticker="⭐">⭐</button>
      <button class="stickerChoice" type="button" data-sticker="🌈">🌈</button>
      <button class="stickerChoice" type="button" data-sticker="❤️">❤️</button>
      <button class="stickerChoice" type="button" data-sticker="🐱">🐱</button>
      <button class="stickerChoice" type="button" data-sticker="🐶">🐶</button>
      <button class="stickerChoice" type="button" data-sticker="🍎">🍎</button>
      <button class="stickerChoice" type="button" data-sticker="🚀">🚀</button>
      <button class="stickerChoice" type="button" data-sticker="🌸">🌸</button>
    </div>

    <div class="bottomTools">
      <div id="palette" class="palette" aria-label="Bảng màu"></div>
      <label class="rangeLabel">Cỡ nét
        <input id="sizeRange" type="range" min="4" max="90" value="28">
      </label>
    </div>
  </section>
</main>

<div id="celebration" class="celebration hidden" role="dialog" aria-modal="true">
  <div class="party-card">
    <div class="party-animal">🌈</div>
    <h2>Bé tô đẹp quá!</h2>
    <p>Bức tranh đã sẵn sàng để lưu và khoe với cả nhà.</p>
    <div class="party-actions">
      <button id="partySaveBtn" class="btn good">💾 Lưu ảnh</button>
      <button id="partyCloseBtn" class="btn primary">Tiếp tục tô</button>
    </div>
  </div>
</div>

<script src="app.js?v=5"></script>
<script src="../kimanh-bridge.js"></script>
</body>
</html>
